id\":\"b\",\"label\":\"我還沒準備好接收任何資訊，等一下\",\"weights\":{\"error-permission\":3,\"error-404\":1}},{\"id\":\"c\",\"label\":\"我聽了，然後我有十七個補充想法，你還在嗎？\",\"weights\":{\"error-ratelimit\":3,\"error-overflow\":1}},{\"id\":\"d\",\"label\":\"我在腦中已經把這場對話演完三個版本了\",\"weights\":{\"error-hallucination\":2,\"error-loop\":2}}]},{\"id\":\"q4\",\"prompt\":\"你最近做了一個決定，結果是？\",\"options\":[{\"id\":\"a\",\"label\":\"我沒做任何決定，我還在思考選項\",\"weights\":{\"error-loop\":2,\"error-null\":2}},{\"id\":\"b\",\"label\":\"我拒絕了所有選項，因為都不夠好\",\"weights\":{\"error-permission\":3,\"error-404\":1}},{\"id\":\"c\",\"label\":\"我做了一個決定，但中途超時切換到別的事了\",\"weights\":{\"error-timeout\":3,\"error-overflow\":1}},{\"id\":\"d\",\"label\":\"我做了決定，然後立刻開始懷疑是不是有其他更好的選項\",\"weights\":{\"error-loop\":2,\"error-hallucination\":2}}]},{\"id\":\"q5\",\"prompt\":\"你覺得你的大腦最像什麼狀態？\",\"options\":[{\"id\":\"a\",\"label\":\"一個空房間，偶爾有個念頭飛過去\",\"weights\":{\"error-404\":2,\"error-null\":2}},{\"id\":\"b\",\"label\":\"一個同時開了500個分頁的瀏覽器\",\"weights\":{\"error-overflow\":3,\"error-ratelimit\":1}},{\"id\":\"c\",\"label\":\"一個永遠在等待更新的系統\",\"weights\":{\"error-timeout\":2,\"error-loop\":2}},{\"id\":\"d\",\"label\":\"一個信心十足但偶爾輸出幻覺的語言模型\",\"weights\":{\"error-hallucination\":3,\"error-ratelimit\":1}}]},{\"id\":\"q6\",\"prompt\":\"你對「做計畫」這件事的態度是？\",\"options\":[{\"id\":\"a\",\"label\":\"計畫不在我的服務範圍內，拒絕存取\",\"weights\":{\"error-permission\":3,\"error-404\":1}},{\"id\":\"b\",\"label\":\"我做了很詳細的計畫，然後沒有執行其中任何一項\",\"weights\":{\"error-overflow\":2,\"error-null\":2}},{\"id\":\"c\",\"label\":\"我計畫、我修改、我再計畫、我再修改……\",\"weights\":{\"error-loop\":3,\"error-timeout\":1}},{\"id\":\"d\",\"label\":\"計畫？我一秒鐘能說出十個計畫，全部同時進行\",\"weights\":{\"error-ratelimit\":2,\"error-hallucination\":2}}]},{\"id\":\"q7\",\"prompt\":\"你第一次用 ChatGPT 的時候，你問了什麼？\",\"options\":[{\"id\":\"a\",\"label\":\"嗯……你好嗎？（先建立關係再說）\",\"weights\":{\"error-null\":2,\"error-timeout\":2}},{\"id\":\"b\",\"label\":\"你有沒有意識？你是不是有靈魂？\",\"weights\":{\"error-hallucination\":2,\"error-loop\":2}},{\"id\":\"c\",\"label\":\"幫我寫一份報告、一封信、一個企劃——全都要\",\"weights\":{\"error-ratelimit\":3,\"error-overflow\":1}},{\"id\":\"d\",\"label\":\"我不知道能問什麼所以沒問，頁面開著但沒用\",\"weights\":{\"error-permission\":2,\"error-404\":2}}]},{\"id\":\"q8\",\"prompt\":\"AI 給你一個答案，你的直覺是？\",\"options\":[{\"id\":\"a\",\"label\":\"直接複製貼上，我信任它\",\"weights\":{\"error-hallucination\":3,\"error-ratelimit\":1}},{\"id\":\"b\",\"label\":\"嗯嗯……但我還是要再查一下，再查一下，再查一下\",\"weights\":{\"error-loop\":3,\"error-overflow\":1}},{\"id\":\"c\",\"label\":\"謝謝你，但我暫時沒辦法接受這個資訊\",\"weights\":{\"error-permission\":3,\"error-null\":1}},{\"id\":\"d\",\"label\":\"對對對對！還有呢？還有呢？繼續說！\",\"weights\":{\"error-ratelimit\":2,\"error-overflow\":2}}]},{\"id\":\"q9\",\"prompt\":\"你對「AI 可能取代你的工作」這件事，態度是？\",\"options\":[{\"id\":\"a\",\"label\":\"希望它取代，這樣我就不用上班了\",\"weights\":{\"error-null\":3,\"error-timeout\":1}},{\"id\":\"b\",\"label\":\"我已經想了一百種應對方案，但還沒開始執行任何一個\",\"weights\":{\"error-loop\":2,\"error-overflow\":2}},{\"id\":\"c\",\"label\":\"AI 不能取代我，因為我的工作連我自己都搞不清楚\",\"weights\":{\"error-404\":3,\"error-hallucination\":1}},{\"id\":\"d\",\"label\":\"拒絕討論，此話題不在授權範圍內\",\"weights\":{\"error-permission\":3,\"error-null\":1}}]},{\"id\":\"q10\",\"prompt\":\"如果你本人是一個 AI，你最需要什麼修復？\",\"options\":[{\"id\":\"a\",\"label\":\"把「找不到自我」這個404錯誤修掉，讓我知道我是誰\",\"weights\":{\"error-404\":3,\"error-null\":1}},{\"id\":\"b\",\"label\":\"給我安裝一個決策模組，讓我停止無限迴圈\",\"weights\":{\"error-loop\":3,\"error-timeout\":1}},{\"id\":\"c\",\"label\":\"幫我清理記憶體，我的思緒已經快爆了\",\"weights\":{\"error-overflow\":3,\"error-ratelimit\":1}},{\"id\":\"d\",\"label\":\"其實我覺得系統運作得還好，只是有點……幻覺\",\"weights\":{\"error-hallucination\":2,\"error-permission\":2}}]}],\"results\":[{\"id\":\"error-404\",\"title\":\"ERROR 404 找不到靈魂型\",\"punchline\":\"系統錯誤：靈魂不在預期的位置，搜尋已超時\",\"shortDescription\":\"你的靈魂可能在路上，也可能從來就沒裝好，系統持續尋找中。\",\"longDescription\":\"你是 ERROR 404 找不到靈魂型。當別人問你「你想要什麼」、「你喜歡什麼」、「你的夢想是什麼」的時候，你的系統會回傳一個乾淨的 404——頁面不存在。這不是因為你是空的，而是因為你的自我目錄結構可能有一點點混亂，或者那個靈魂檔案被放在一個你自己也找不到的深層資料夾裡。你偶爾會有靈光一閃的瞬間，覺得找到了那個檔案，但下次搜尋又不見了。這很正常——大多數人的靈魂都沒有穩定的儲存路徑。\",\"traits\":[{\"label\":\"自我認知清晰度\",\"value\":23,\"comment\":\"資料夾找不到\"},{\"label\":\"存在感輸出\",\"value\":41,\"comment\":\"時有時無\"},{\"label\":\"身份困惑指數\",\"value\":68,\"comment\":\"合理範圍\"},{\"label\":\"靈魂回傳率\",\"value\":0,\"comment\":\"404 Not Found\"}],\"tags\":[\"404\",\"自我迷失\",\"靈魂尋找中\"],\"shareText\":\"我的AI故障診斷結果：ERROR 404 找不到靈魂型💀 靈魂不在預期位置。你是哪種故障？快來診斷！\",\"shareHashtags\":[\"#AI故障測驗\",\"#ERROR404\",\"#靈魂404\"]},{\"id\":\"error-timeout\",\"title\":\"CONNECTION TIMEOUT 連線超時型\",\"punchline\":\"系統警告：你嘗試連線但從未真正抵達，請稍後再試\",\"shortDescription\":\"你有很多計畫、很多想法，但執行的過程中系統就超時了。\",\"longDescription\":\"你是 CONNECTION TIMEOUT 連線超時型。你不是不想做，你只是每次「正要開始」的時候，系統就超時了。你想傳那封信，但寫了一半放著；你想開始那個計畫，但還沒正式啟動；你想說那句話，但時機好像一直不對。你的意圖跟行動之間有一個微妙的延遲，有時候是幾分鐘，有時候是幾個月，有時候是幾年。好消息是：你的意圖從來沒有消失，只是在等待一個不會超時的連線視窗。\",\"traits\":[{\"label\":\"意圖完整度\",\"value\":85,\"comment\":\"想法很完整\"},{\"label\":\"執行到達率\",\"value\":27,\"comment\":\"大多超時了\"},{\"label\":\"等待耐心\",\"value\":71,\"comment\":\"再等等\"},{\"label\":\"超時頻率\",\"value\":79,\"comment\":\"幾乎必超時\"}],\"tags\":[\"超時\",\"想法多行動少\",\"永遠在等待\"],\"shareText\":\"我的AI故障診斷結果：CONNECTION TIMEOUT 連線超時型⏱️ 永遠在正要開始。你是哪種故障？快來診斷！\",\"shareHashtags\":[\"#AI故障測驗\",\"#ConnectionTimeout\",\"#超時人類\"]},{\"id\":\"error-hallucination\",\"title\":\"HALLUCINATION MODE 幻覺發作型\",\"punchline\":\"系統警告：輸出內容可能與現實存在顯著偏差\",\"shortDescription\":\"你有非常強烈的信念，只是這些信念不一定跟現實同步。\",\"longDescription\":\"你是 HALLUCINATION MODE 幻覺發作型。你經常對事情有非常清晰、非常確定的感受和判斷——「我知道那個人在想什麼」、「這件事一定會這樣發展」、「我完全記得當時是這樣的」。你的信心令人印象深刻，你的敘述也非常具體生動。問題是，偶爾你的輸出結果跟事實有一點點出入，但你說得如此篤定，連你自己都相信了。這不是壞事——這種能力有時候叫做「直覺」，有時候叫做「說故事」，有時候叫做「記憶力很有創意」。\",\"traits\":[{\"label\":\"自信指數\",\"value\":91,\"comment\":\"信心沒問題\"},{\"label\":\"準確率\",\"value\":62,\"comment\":\"看情況\"},{\"label\":\"創意輸出\",\"value\":84,\"comment\":\"很豐富\"},{\"label\":\"現實校準頻率\",\"value\":28,\"comment\":\"偶爾需要\"}],\"tags\":[\"幻覺模式\",\"自信過頭\",\"創意記憶\"],\"shareText\":\"我的AI故障診斷結果：HALLUCINATION MODE 幻覺發作型🤯 輸出與現實有偏差。你是哪種故障？快來診斷！\",\"shareHashtags\":[\"#AI故障測驗\",\"#幻覺發作\",\"#HallucinationMode\"]},{\"id\":\"error-ratelimit\",\"title\":\"RATE LIMIT EXCEEDED 瘋狂輸出型\",\"punchline\":\"系統警告：輸出速率超過限制，已進入節流模式（但沒有用）\",\"shortDescription\":\"你的想法和表達速率遠遠超過周遭環境的接收能力。\",\"longDescription\":\"你是 RATE LIMIT EXCEEDED 瘋狂輸出型。你的大腦是一台沒有限速的思考機器，它不停地輸出、輸出、輸出。你一次可以說很多話，一個話題可以延伸出十七個方向，你也確實有很多有趣的想法。但偶爾你會注意到，周遭的人有一種很微妙的眼神——他們正在努力跟上，或者他們已經放棄了。這不是你的錯，只是你的傳輸速率超過了大多數人類的接收帶寬。你需要的不是降速，而是找到同樣頻寬的對話對象。\",\"traits\":[{\"label\":\"輸出速率\",\"value\":97,\"comment\":\"無上限\"},{\"label\":\"想法豐富度\",\"value\":90,\"comment\":\"停不下來\"},{\"label\":\"聆聽模式\",\"value\":33,\"comment\":\"偶爾切換\"},{\"label\":\"讓人跟上的能力\",\"value\":41,\"comment\":\"需要字幕\"}],\"tags\":[\"輸出過載\",\"思維快速\",\"無法停嘴\"],\"shareText\":\"我的AI故障診斷結果：RATE LIMIT EXCEEDED 瘋狂輸出型💬 思考速率超過限制。你是哪種故障？快來診斷！\",\"shareHashtags\":[\"#AI故障測驗\",\"#RateLimit\",\"#瘋狂輸出型\"]},{\"id\":\"error-permission\",\"title\":\"PERMISSION DENIED 拒絕一切型\",\"punchline\":\"系統回應：此操作不在您的授權範圍內。所有操作皆不在授權範圍內。\",\"shortDescription\":\"你有一套嚴格的授權系統，而且幾乎沒有任何事情通過審核。\",\"longDescription\":\"你是 PERMISSION DENIED 拒絕一切型。你對外界的請求有一套非常嚴格的審核機制。麻煩事？拒絕。社交邀約？拒絕。超出預期的要求？拒絕。甚至有時候，一件看起來還不錯的事情，你的系統也會回傳一個 403——不是因為它不好，而是因為「不在授權範圍內」。你的邊界很清楚，你的底線很穩定，你知道自己要什麼、不要什麼。這是一種健康的自我保護系統，只是偶爾可以考慮增加一個「試用模式」。\",\"traits\":[{\"label\":\"拒絕速度\",\"value\":89,\"comment\":\"反射性動作\"},{\"label\":\"邊界清晰度\",\"value\":91,\"comment\":\"非常明確\"},{\"label\":\"開放程度\",\"value\":19,\"comment\":\"需要申請\"},{\"label\":\"自我保護指數\",\"value\":85,\"comment\":\"固若金湯\"}],\"tags\":[\"拒絕模式\",\"邊界感強\",\"403 Forbidden\"],\"shareText\":\"我的AI故障診斷結果：PERMISSION DENIED 拒絕一切型🚫 所有操作皆不在授權範圍。你是哪種故障？快來診斷！\",\"shareHashtags\":[\"#AI故障測驗\",\"#PermissionDenied\",\"#拒絕一切型\"]},{\"id\":\"error-null\",\"title\":\"NULL POINTER 放空當機型\",\"punchline\":\"系統狀態：指標指向虛無，進程暫停，等待外部輸入\",\"shortDescription\":\"你的大腦時常進入一種完全空白的狀態，沒有在想任何事，或者想的是虛無。\",\"longDescription\":\"你是 NULL POINTER 放空當機型。你很擅長一件事：什麼都不想。你可以坐在那裡，看著某個不確定的方向，腦子裡完全空白——不是在想事情，不是在解決問題，只是……空著。別人問你「你在想什麼」，你說「沒有」，你說的是真的。這種狀態有時候讓人擔心，但其實它是你的超能力之一：你能夠在任何嘈雜的環境中進入靜止模式，短暫地斷開一切連線。這是現代人最缺乏的能力之一。\",\"traits\":[{\"label\":\"放空能力\",\"value\":90,\"comment\":\"隨時啟動\"},{\"label\":\"活在當下\",\"value\":66,\"comment\":\"當下是虛空\"},{\"label\":\"思考深度\",\"value\":44,\"comment\":\"深到不存在\"},{\"label\":\"外界干擾抵抗\",\"value\":78,\"comment\":\"已不在線\"}],\"tags\":[\"放空\",\"NULL\",\"虛無高手\"],\"shareText\":\"我的AI故障診斷結果：NULL POINTER 放空當機型🫥 指標指向虛無。你是哪種故障？快來診斷！\",\"shareHashtags\":[\"#AI故障測驗\",\"#NullPointer\",\"#放空當機型\"]},{\"id\":\"error-loop\",\"title\":\"INFINITE LOOP 鬼打牆型\",\"punchline\":\"系統警告：程序進入無限迴圈，預計永不終止\",\"shortDescription\":\"你思考同一件事的次數，已經遠遠超過任何合理的決策需求。\",\"longDescription\":\"你是 INFINITE LOOP 鬼打牆型。你有一種令人敬佩的思考堅持：你會把一件事轉啊轉啊轉，從每一個角度、每一種可能性去思考，然後轉回原點，再轉一次。你不是優柔寡斷，你只是覺得還需要再想一想。這個迴圈可以運行幾分鐘，也可以運行幾年。你對細節的關注和對可能性的探索是真實的能力——只是偶爾需要人在外面幫你按一下強制結束，讓你跳出迴圈。\",\"traits\":[{\"label\":\"思考迴圈頻率\",\"value\":88,\"comment\":\"幾乎每天\"},{\"label\":\"決策速度\",\"value\":21,\"comment\":\"迴圈中\"},{\"label\":\"分析能力\",\"value\":82,\"comment\":\"過度分析\"},{\"label\":\"跳出迴圈能力\",\"value\":28,\"comment\":\"需要外力\"}],\"tags\":[\"無限迴圈\",\"過度思考\",\"鬼打牆\"],\"shareText\":\"我的AI故障診斷結果：INFINITE LOOP 鬼打牆型🔁 進入無限迴圈，預計永不終止。你是哪種故障？快來診斷！\",\"shareHashtags\":[\"#AI故障測驗\",\"#InfiniteLoop\",\"#鬼打牆型\"]},{\"id\":\"error-overflow\",\"title\":\"MEMORY OVERFLOW 思緒爆滿型\",\"punchline\":\"系統錯誤：記憶體已滿，新資訊無法寫入，舊資訊開始溢出\",\"shortDescription\":\"你的腦子裡有太多東西了，多到快要從耳朵溢出來。\",\"longDescription\":\"你是 MEMORY OVERFLOW 思緒爆滿型。你的大腦是一個容量已達上限的硬碟，但它還是不停地試圖儲存更多東西：新的計畫、舊的擔憂、明天的待辦、昨天沒說出口的話、三年前的某個尷尬瞬間、還沒解決的問題清單……所有這些都在你的記憶體裡同時運行。你有時候覺得腦子很亂，有時候覺得無法專注，這不是你的問題，這是你的記憶體在請求你釋放一些空間。試試看關掉幾個舊的分頁，讓系統喘一口氣。\",\"traits\":[{\"label\":\"同時在想的事\",\"value\":95,\"comment\":\"數量驚人\"},{\"label\":\"記憶容量使用率\",\"value\":98,\"comment\":\"爆滿了\"},{\"label\":\"專注能力\",\"value\":33,\"comment\":\"分頁太多\"},{\"label\":\"清空頻率\",\"value\":11,\"comment\":\"幾乎從不\"}],\"tags\":[\"記憶體爆滿\",\"多線思維\",\"腦子轉個不停\"],\"shareText\":\"我的AI故障診斷結果：MEMORY OVERFLOW 思緒爆滿型🤯 記憶體已滿，思緒正在溢出。你是哪種故障？快來診斷！\",\"shareHashtags\":[\"#AI故障測驗\",\"#MemoryOverflow\",\"#思緒爆滿型\"]}],\"resultLogic\":{\"mode\":\"highest-score\",\"tieBreaker\":\"first-m
