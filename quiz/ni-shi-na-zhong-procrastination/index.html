:2,\"the-task-avoider\":1}},{\"id\":\"c\",\"label\":\"充滿各種有趣的小玩意、書籍、或許多未完成的專案筆記，因為你很容易被新事物吸引。\",\"weights\":{\"the-distracted-explorer\":3,\"the-overwhelmed-hoarder\":1}},{\"id\":\"d\",\"label\":\"堆滿了需要處理但還沒碰的各種文件和雜物，光看就覺得頭大。\",\"weights\":{\"the-overwhelmed-hoarder\":3,\"the-task-avoider\":2}}]},{\"id\":\"q7\",\"prompt\":\"當你被要求做出一個重要決定時，你通常會怎麼做？\",\"options\":[{\"id\":\"a\",\"label\":\"會花費大量時間研究所有選項，分析利弊，只為確保做出「最正確」的選擇，但常常因此延誤。\",\"weights\":{\"the-perfectionist-procrastinator\":3,\"the-indecisive-procrastinator\":2}},{\"id\":\"b\",\"label\":\"等到時間所剩無幾，不得不做決定時才匆忙選擇。\",\"weights\":{\"the-deadline-junkie\":3}},{\"id\":\"c\",\"label\":\"嘗試收集更多資訊，結果卻被許多無關緊要的細節吸引，偏離了做決定的主題。\",\"weights\":{\"the-distracted-explorer\":3}},{\"id\":\"d\",\"label\":\"感到焦慮和困惑，遲遲無法下定決心，希望別人能幫你做決定。\",\"weights\":{\"the-indecisive-procrastinator\":3,\"the-overwhelmed-hoarder\":2}}]},{\"id\":\"q8\",\"prompt\":\"你如何描述你開始一項任務的過程？\",\"options\":[{\"id\":\"a\",\"label\":\"我會花很多時間規劃和準備，確保萬無一失，但實際執行卻很慢。\",\"weights\":{\"the-perfectionist-procrastinator\":3,\"the-indecisive-procrastinator\":1}},{\"id\":\"b\",\"label\":\"我需要一個強烈的外部刺激（如截止日期或他人的催促）才能真正動起來。\",\"weights\":{\"the-deadline-junkie\":3}},{\"id\":\"c\",\"label\":\"我常常在開始之前就被其他突然出現的「更好玩」或「更有趣」的事情吸引走了。\",\"weights\":{\"the-distracted-explorer\":3}},{\"id\":\"d\",\"label\":\"只要想到這項任務會很困難或不愉快，我就會自動把注意力轉移到其他事情上。\",\"weights\":{\"the-task-avoider\":3,\"the-rebellious-procrastinator\":1}}]},{\"id\":\"q9\",\"prompt\":\"當你感到壓力很大時，你的拖延症會如何表現？\",\"options\":[{\"id\":\"a\",\"label\":\"壓力讓我更想把事情做好，但這也增加了我對失敗的恐懼，導致更難開始。\",\"weights\":{\"the-perfectionist-procrastinator\":3,\"the-indecisive-procrastinator\":1}},{\"id\":\"b\",\"label\":\"壓力反而激發我的潛能，讓我在最後一刻爆發，高效完成任務。\",\"weights\":{\"the-deadline-junkie\":3}},{\"id\":\"c\",\"label\":\"壓力讓我更想逃離現實，於是我就會去尋找各種有趣的、能讓我分心的事物。\",\"weights\":{\"the-distracted-explorer\":3,\"the-rebellious-procrastinator\":1}},{\"id\":\"d\",\"label\":\"壓力讓我感到麻痺，完全不想動，只想逃避所有責任。\",\"weights\":{\"the-overwhelmed-hoarder\":3,\"the-task-avoider\":2}}]},{\"id\":\"q10\",\"prompt\":\"拖延對你來說意味著什麼？\",\"options\":[{\"id\":\"a\",\"label\":\"這是確保我能提交最高品質成果的必要過程，雖然有時會超時。\",\"weights\":{\"the-perfectionist-procrastinator\":3}},{\"id\":\"b\",\"label\":\"這是我的工作模式，我需要那種腎上腺素的刺激才能發揮最佳水準。\",\"weights\":{\"the-deadline-junkie\":3}},{\"id\":\"c\",\"label\":\"這是生活充滿無限可能和探索樂趣的證明，畢竟有太多東西比「待辦事項」更有趣。\",\"weights\":{\"the-distracted-explorer\":3}},{\"id\":\"d\",\"label\":\"這是對那些我不認同的規則、要求或權威的一種無聲反抗。\",\"weights\":{\"the-rebellious-procrastinator\":3,\"the-task-avoider\":1}}]}],\"resultLogic\":{\"mode\":\"highest-score\",\"tieBreaker\":\"first-max\"},\"results\":[{\"id\":\"the-perfectionist-procrastinator\",\"title\":\"完美主義\",\"punchline\":\"不是不做，是還沒找到最完美的起點！\",\"longDescription\":\"你對事情有著極高的標準，深信只有最好才值得開始。因為害怕結果不盡理想，你寧願無限期延遲，只為等待那個「完美時機」。在等待最佳時機的同時，時間卻悄悄溜走了，讓你感到既焦慮又無奈。\",\"traits\":[{\"label\":\"完美標準\",\"value\":90,\"comment\":\"對細節與成果有極高要求\"},{\"label\":\"害怕失敗\",\"value\":85,\"comment\":\"擔心無法達到預期而卻步\"}],\"shareText\":\"我的拖延症是「完美主義」型！原來不是懶，只是追求極致！誰跟我一樣，總在等待那個完美的開始？😅 #拖延症 #完美主義 #還在等靈感\",\"shareHashtags\":[\"#完美主義拖延\",\"#龜毛不是病\",\"#追求卓越\"],\"shortDescription\":\"不是不做，是還沒找到最完美的起點！\",\"tags\":[\"你的拖延症是哪種類型？\",\"完美主義\",\"人格測驗\"]},{\"id\":\"the-deadline-junkie\",\"title\":\"壓力衝刺\",\"punchline\":\"沒壓力沒動力，我的腎上腺素需要刺激！\",\"longDescription\":\"你相信在壓力下才能激發潛能，越接近截止日，你的效率反而越高、思緒越清晰。你享受那種在最後一刻衝刺完成的成就感，覺得這才是工作真正的醍醐味。但這也讓你常常瀕臨崩潰邊緣，心臟要很大顆！\",\"traits\":[{\"label\":\"壓力驅動\",\"value\":92,\"comment\":\"在極限壓力下表現最佳\"},{\"label\":\"高效短暫\",\"value\":88,\"comment\":\"衝刺期效率高，但無法持續\"}],\"shareText\":\"😱 揭曉我的拖延症是「壓力衝刺」型！原來我是個刺激愛好者，沒壓力不工作！有人懂我這種DDL戰士的浪漫嗎？ #拖延症 #DDL戰士 #極限挑戰\",\"shareHashtags\":[\"#DDL戰士\",\"#壓力才給力\",\"#極限衝刺\"],\"shortDescription\":\"沒壓力沒動力，我的腎上腺素需要刺激！\",\"tags\":[\"你的拖延症是哪種類型？\",\"壓力衝刺\",\"人格測驗\"]},{\"id\":\"the-distracted-explorer\",\"title\":\"分心探索\",\"punchline\":\"世界那麼大，我總是被新奇事物牽走！\",\"longDescription\":\"你對周遭的一切充滿好奇，總是能發現比手邊任務更有趣的事物。一個點擊、一則通知，都能讓你展開一場「微探險」，沉浸在無止盡的資訊流中。你的大腦停不下來，但主要任務卻常常因此擱置，讓你事後懊悔不已。\",\"traits\":[{\"label\":\"好奇心強\",\"value\":95,\"comment\":\"容易被新奇事物吸引\"},{\"label\":\"易受干擾\",\"value\":89,\"comment\":\"專注力容易被分散\"}],\"shareText\":\"發現我是「分心探索」型拖延症！🤣 我不是故意拖延，只是這個世界太有趣了，忍不住就去探險了！有人也是這樣嗎？ #拖延症 #好奇寶寶 #世界太精彩\",\"shareHashtags\":[\"#分心不是錯\",\"#好奇心旺盛\",\"#探索者人生\"],\"shortDescription\":\"世界那麼大，我總是被新奇事物牽走！\",\"tags\":[\"你的拖延症是哪種類型？\",\"分心探索\",\"人格測驗\"]},{\"id\":\"the-task-avoider\",\"title\":\"任務逃避\",\"punchline\":\"假裝沒看到，任務就不會找上我！\",\"longDescription\":\"你傾向逃避那些讓你感到不適、困難或無聊的任務，深怕面對它們會帶來負面情緒。面對挑戰時，你會選擇視而不見或轉移注意力到更輕鬆的事物上。這種策略雖然能暫時緩解焦慮，卻讓問題越積越多，最終壓力更大。\",\"traits\":[{\"label\":\"迴避困難\",\"value\":91,\"comment\":\"傾向逃避令人不適的任務\"},{\"label\":\"害怕不適\",\"value\":87,\"comment\":\"對負面情緒的耐受度較低\"}],\"shareText\":\"我的拖延症是「任務逃避」型… 🙈 每次看到討厭的任務都想裝死！有沒有人跟我一樣，寧願躲起來也不想面對？ #拖延症 #逃避雖可恥但有用 #不想面對\",\"shareHashtags\":[\"#任務逃避症\",\"#眼不見為淨\",\"#暫時性失憶\"],\"shortDescription\":\"假裝沒看到，任務就不會找上我！\",\"tags\":[\"你的拖延症是哪種類型？\",\"任務逃避\",\"人格測驗\"]},{\"id\":\"the-overwhelmed-hoarder\",\"title\":\"無力感囤積\",\"punchline\":\"事情多到不知從何下手，乾脆先放著吧！\",\"longDescription\":\"你常常被堆積如山的工作和生活瑣事壓垮，感到自己無法負荷。面對龐大的任務清單，你感到無從下手，進而產生深深的無力感與絕望。最終，你選擇將所有事情都「囤積」起來，希望它們能自己消失或奇蹟般地解決。\",\"traits\":[{\"label\":\"任務超載\",\"value\":93,\"comment\":\"被過多任務壓垮，無法啟動\"},{\"label\":\"無從下手\",\"value\":89,\"comment\":\"不知道該從哪個點開始執行\"}],\"shareText\":\"嗚嗚，我是「無力感囤積」型拖延症！😭 事情多到想哭，誰來救救我，教我怎麼把爛攤子收拾好？ #拖延症 #任務爆炸 #無力感爆棚\",\"shareHashtags\":[\"#任務太多\",\"#無力感\",\"#不知所措\"],\"shortDescription\":\"事情多到不知從何下手，乾脆先放著吧！\",\"tags\":[\"你的拖延症是哪種類型？\",\"無力感囤積\",\"人格測驗\"]},{\"id\":\"the-indecisive-procrastinator\",\"title\":\"決策困難\",\"punchline\":\"我需要更多時間思考，一個決定會影響我一生！\",\"longDescription\":\"你在做任何決策前，總是要花費大量的時間權衡利弊，深怕做出錯誤的選擇。擔心選擇會帶來不可逆的後果，導致你遲遲無法開始行動。即使是雞毛蒜皮的小事，你也可能陷入分析癱瘓，讓機會悄然溜走。\",\"traits\":[{\"label\":\"選擇障礙\",\"value\":90,\"comment\":\"難以做出任何決定\"},{\"label\":\"過度分析\",\"value\":85,\"comment\":\"反覆思量所有可能性\"}],\"shareText\":\"天啊，我是「決策困難」型拖延症！🤔 每做一個決定都像在走鋼索，一個不小心就會跌入深淵！有人也是選擇困難戶嗎？ #拖延症 #選擇障礙 #想太多\",\"shareHashtags\":[\"#選擇困難\",\"#猶豫不決\",\"#思考人生\"],\"shortDescription\":\"我需要更多時間思考，一個決定會影響我一生！\",\"tags\":[\"你的拖延症是哪種類型？\",\"決策困難\",\"人格測驗\"]},{\"id\":\"the-rebellious-procrastinator\",\"title\":\"叛逆抵抗\",\"punchline\":\"你越叫我做，我越不想做！這不是拖延，是我的態度！\",\"longDescription\":\"你內心深處有種反抗權威或規定的傾向，不喜歡被約束或控制。當感覺被強迫、被催促，或不認同某項任務時，你會透過拖延來表達不滿與抗議。這是一種被動的抵抗，展現你對自主權的堅持與捍衛。\",\"traits\":[{\"label\":\"抗拒權威\",\"value\":92,\"comment\":\"不喜歡被命令或強迫\"},{\"label\":\"被動抵抗\",\"value\":88,\"comment\":\"透過拖延表達不滿或反抗\"}],\"shareText\":\"喔買尬，我的拖延症是「叛逆抵抗」型！😎 誰叫你要我做？我偏不！有沒有人跟我一樣，不喜歡被控制，喜歡用自己的步調做事？ #拖延症 #叛逆不是罪 #我的地盤我做主\",\"shareHashtags\":[\"#叛逆魂\",\"#我的步調\",\"#不喜歡被催\"],\"shortDescription\":\"你越叫我做，我越不想做！這不是拖延，是我的態度！\",\"tags\":[\"你的拖延症是哪種類型？\",\"叛逆抵抗\",\"人格測驗\"]}],\"seo\":{\"metaTitle\":\"你的拖延症是哪種類型？精準測驗\",\"metaDescription\":\"你的拖延症是哪種類型？2分鐘精準人格測驗，結果讓人想截圖！\",\"keywords\":[\"你的拖延症是哪種類型？\",\"人格測驗\",\"台灣\",\"拖延診斷書\"]},\"share\":{\"url\":\"https://0xfriday.github.io/viral-quiz-engine/quiz/ni-shi-na-zhong-procrastination/\"},\"monetization\":{\"adsense\":true,\"publisherId\":\"ca-pub-5477484686814211\"},\"generated_date\":\"2026-04-24\"}}]]}]],null],null]},[\"$\",\"$L5\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"quiz\",\"children\",\"$6\",\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"notFoundStyles\":\"$undefined\",\"styles\":null}],null]},[\"$\",\"$L5\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"quiz\",\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L7\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"notFoundStyles\":\"$undefined\",\"styles\":null}],null]},[[\"$\",\"html\",null,{\"lang\":\"zh-TW\",\"children\":[[\"$\",\"head\",null,{\"children\":[\"$\",\"script\",null,{\"async\":true,\"src\":\"https://page
